name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-name:
    name: Validate Branch Name
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        shell: bash
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Checking: $BRANCH"

          if echo "$BRANCH" | grep -Eq '^(feature|fix|chore|docs|hotfix)/.+$'; then
            echo "Branch name valid."
          else
            echo "Invalid branch name: $BRANCH"
            echo "Allowed: feature/*, fix/*, chore/*, docs/*, hotfix/*"
            exit 1
          fi

  verify:
    name: Lint, Test, and Build
    needs: branch-name
    if: always() && (github.event_name == 'push' || needs.branch-name.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Pin npm
        run: npm install -g npm@10.9.7

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
